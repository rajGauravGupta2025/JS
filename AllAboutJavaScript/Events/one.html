	//-------------------------------------------------------------------------------
	
	//Event Propagation - It has two context
	//1. Event Bubbling - The default value is false which occurs by event bubbling
	//2. Event Capturing - In some scenario we need "true" which occurs by event capturing
	
	document.getElementById('images').addEventListener('click',function(e){
	//console.log('Clicked inside the ul')
	},false)
	
	document.getElementById('owl').addEventListener('click',function(e){
	console.log('Owl Clicked')
	//e.stopPropagation() -> This method stops the event bubbling
	//alert('Owl clicked again!')
	},false)
	
	//Note: Here when we are clicking the other id's images except owl then first event called and when we are clicking on the id with name 'owl' the first the owl event called then images event called and this is called event bubbling(Since bubble always go from lower to upper)
	
	//If we change the "false -> true" then it called event capturing with the flow from Upper to lower

	//Task - Remove the image after clicking...
	document.querySelector('#images').addEventListener('click',function(e){
	console.log(e)
	console.log(e.target.tagName)
	if(e.target.tagName === 'IMG'){
	let removeIt = e.target.parentNode
	//removeIt.remove()
	removeIt.parentNode.removeChild(removeIt)
	}
	//we have used if statement because parent Node is 'li' and onclicking on the li tag it also removes all the li tag and we want to remove only the IMG tag
	//let removeIt = e.target.parentNode
	//removeIt.remove()
	//removeIt.parentNode.removeChild(removeIt)
	},false)
